<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ffffff; padding: 40px; display: flex; justify-content: center; }
        .admin-card { background: #fff; padding: 30px; border-radius: 25px; width: 400px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #000; color: #fff; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        h2 { margin-top: 0; text-align: center; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Admin Dashboard</h2>
    <input type="text" id="userEmail" placeholder="Օգտատիրոջ ID (Email)">
    <input type="number" id="newCoins" placeholder="Coin-ների քանակ">
    <input type="number" id="newLevel" placeholder="Level">
    <input type="text" id="newRank" placeholder="Rank նկարի Link (URL)">
    <button onclick="updateUser()">Պահպանել Տվյալները</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Քո իրական տվյալները նկարից
  const firebaseConfig = {
    apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
    authDomain: "mrgh-project.firebaseapp.com",
    projectId: "mrgh-project",
    storageBucket: "mrgh-project.firebasestorage.app",
    messagingSenderId: "128834044854",
    appId: "1:128834044854:web:ce5e8dac90395ffeddf717",
    measurementId: "G-D9VXN3NYW1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.updateUser = async function() {
    const email = document.getElementById('userEmail').value;
    const coins = document.getElementById('newCoins').value;
    const level = document.getElementById('newLevel').value;
    const rank = document.getElementById('newRank').value;

    if(!email) return alert("Մուտքագրիր Email-ը");

    try {
      await setDoc(doc(db, "users", email), {
        coins: Number(coins),
        level: Number(level),
        rank_img: rank
      }, { merge: true });
      alert("Տվյալները հաջողությամբ պահպանվեցին բազայում:");
    } catch (e) {
      alert("Սխալ տեղի ունեցավ: Ստուգիր Firestore-ի կանոնները (Rules):");
    }
  }
</script>
</body>
</html>
