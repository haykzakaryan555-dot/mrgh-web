<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRGH - Dashboard</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body {
            background: #1e1e1e url('https://www.minecraft.net/content/dam/games/minecraft/key-art/Games_Subnav_Minecraft-Wild-Update_600x338.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Minecraft', sans-serif;
            color: white;
            margin: 0;
            text-shadow: 2px 2px #000;
        }
        .top-nav {
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 4px solid #3c3c3c;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .coins-val { color: #FFD700; font-size: 20px; }
        .level-val { color: #32CD32; font-size: 20px; }
        .logout-btn {
            background: #aa0000;
            border: 3px solid #000;
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Minecraft', sans-serif;
        }
        .container {
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .menu-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #1e1e1e;
            padding: 40px;
            text-align: center;
        }
        #debugStatus { font-size: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-nav">
    <div>LEVEL: <span id="dispLevel" class="level-val">...</span></div>
    <div>COINS: <span id="dispCoins" class="coins-val">...</span></div>
    <button class="logout-btn" id="logoutBtn">LOGOUT</button>
</div>

<div class="container">
    <div class="menu-panel">
        <h1>ՔՈ ՊՐՈՖԻԼԸ</h1>
        <p id="userMail" style="color: #bbb; font-size: 14px;"></p>
        <div id="debugStatus">Ստուգում եմ բազան...</div>
        <button style="background:#484948; color:white; border:2px solid #000; padding:10px; width:100%; margin-top:15px; cursor:pointer; font-family:'Minecraft';">ԻՄ TASKS</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = "index.html");

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userMail').innerText = user.email;

            // ԱՎՏՈՄԱՏ ՌԵԺԻՄ: Կարդում ենք 'users' կոլեկցիայի առաջին պատահած տողը
            const q = query(collection(db, "users"), limit(1));

            onSnapshot(q, (querySnapshot) => {
                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        console.log("Տվյալը գտնվեց!", data);
                        document.getElementById('dispCoins').innerText = (data.coins !== undefined) ? data.coins : "0";
                        document.getElementById('dispLevel').innerText = (data.level !== undefined) ? data.level : "1";
                        document.getElementById('debugStatus').innerText = "ԿԱՊԸ ՀԱՍՏԱՏՎԱԾ Է ✅";
                        document.getElementById('debugStatus').style.color = "#32CD32";
                    });
                } else {
                    document.getElementById('debugStatus').innerText = "ԲԱԶԱՆ ԴԱՏԱՐԿ Է ❌ (Սարքիր 'users' կոլեկցիան)";
                    document.getElementById('debugStatus').style.color = "#ff4444";
                }
            }, (error) => {
                document.getElementById('debugStatus').innerText = "ՍԽԱԼ: " + error.message;
                console.error(error);
            });
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
