<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Dashboard</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body { background: #313131; color: white; font-family: 'Minecraft', sans-serif; margin: 0; }
        .top-bar { background: rgba(0,0,0,0.8); padding: 15px; display: flex; justify-content: space-between; border-bottom: 4px solid #3c3c3c; }
        .logout-btn { background: #aa0000; color: white; border: 2px solid #00; cursor: pointer; padding: 5px 10px; font-family: 'Minecraft'; }
        .coin-val { color: #FFD700; }
        .level-val { color: #32CD32; }
    </style>
</head>
<body>

<div class="top-bar">
    <div>LEVEL: <span id="dispLevel" class="level-val">...</span></div>
    <div>COINS: <span id="dispCoins" class="coin-val">...</span></div>
    <button class="logout-btn" id="logoutBtn">LOGOUT</button>
</div>

<div style="text-align: center; margin-top: 50px;">
    <h1>ԲԱՐԻ ԳԱԼՈՒՍՏ</h1>
    <p id="userMail"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = "index.html");

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userMail').innerText = user.email;
            // Կարևոր. Կարդում ենք ըստ user.email-ի
            onSnapshot(doc(db, "users", user.email), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('dispCoins').innerText = data.coins;
                    document.getElementById('dispLevel').innerText = data.level;
                } else {
                    document.getElementById('dispCoins').innerText = "ԴԱՏԱ ՉԿԱ";
                }
            });
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
