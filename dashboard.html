<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Dashboard</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body { background: #313131 url('https://www.minecraft.net/content/dam/games/minecraft/key-art/Games_Subnav_Minecraft-Wild-Update_600x338.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Minecraft', sans-serif; color: white; margin: 0; }
        .stats-bar { background: rgba(0,0,0,0.85); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3c3c3c; }
        .logout-btn { background: #aa0000; border: 2px solid #000; color: white; padding: 5px 15px; cursor: pointer; font-family: 'Minecraft', sans-serif; font-size: 12px; }
        .logout-btn:hover { background: #ff0000; }
        .main-content { display: flex; flex-direction: column; align-items: center; margin-top: 80px; }
        .xp-val { color: #32CD32; }
        .gold-val { color: #FFD700; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div>LEVEL: <span id="dispLevel" class="xp-val">1</span></div>
    <div>COINS: <span id="dispCoins" class="gold-val">0</span></div>
    <button class="logout-btn" id="logoutBtn">ԴՈՒՐՍ ԳԱԼ</button>
</div>

<div class="main-content">
    <div style="background: rgba(0,0,0,0.7); padding: 30px; border: 4px solid #1e1e1e; text-align: center;">
        <h1>ՔՈ ՊՐՈՖԻԼԸ</h1>
        <p id="userMail" style="font-size: 12px; color: #bbb;"></p>
        <button style="background: #484948; color: white; border: 2px solid #000; padding: 10px; cursor: pointer; font-family: 'Minecraft';">ԻՄ TASKS</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Դուրս գալու ֆունկցիան
    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userMail').innerText = user.email;
            // Կարդում ենք ըստ քո Firestore-ի Document ID-ի (email-ի)
            onSnapshot(doc(db, "users", user.email), (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();
        console.log("Բազայից եկած տվյալը:", data); // Սա ստուգելու համար է
        document.getElementById('dispCoins').innerText = data.coins !== undefined ? data.coins : "Չկա";
        document.getElementById('dispLevel').innerText = data.level || 1;
    }
});
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
