<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - FINAL FIX</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Minecraft', sans-serif; text-align: center; padding: 50px; }
        .box { border: 4px solid #555; padding: 20px; display: inline-block; background: #333; }
        #coins { color: #FFD700; font-size: 40px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>LEVEL: <span id="lvl">0</span></h1>
        <h1>COINS: <span id="coins">0</span></h1>
        <div id="st" style="font-size: 10px; color: #888; margin-top: 10px;">Սպասիր...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // !!! ՀԱՅԿ, ԱՅՍՏԵՂ ԴԻՐ ՔՈ PROJECT SETTINGS-ԻՑ ՎԵՐՑՐԱԾ ԿՈԴԸ !!!
    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Սա ամենակարճ ու ճիշտ ճանապարհն է
            // Եթե քո նկարի պես ես սարքել, ուրեմն սա է.
            const docRef = doc(db, "users", "users", "users", user.uid);

            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('coins').innerText = d.coins;
                    document.getElementById('lvl').innerText = d.level;
                    document.getElementById('st').innerText = "ՄԻԱՑՎԱԾ Է ✅";
                } else {
                    document.getElementById('st').innerText = "Տվյալը չկա: UID-ն՝ " + user.uid;
                }
            });
        }
    });
</script>
</body>
</html>
