<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Dashboard</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body { background: #1e1e1e; font-family: 'Minecraft', sans-serif; color: white; text-align: center; margin: 0; padding: 50px; }
        .stats { border: 4px solid #3c3c3c; background: rgba(0,0,0,0.8); padding: 30px; display: inline-block; }
        #coins { color: #FFD700; font-size: 35px; }
        #lvl { color: #32CD32; font-size: 35px; }
    </style>
</head>
<body>

    <div class="stats">
        <h1>LEVEL: <span id="lvl">0</span></h1>
        <h1>COINS: <span id="coins">0</span></h1>
        <div id="status" style="margin-top:20px; font-size:12px;">Ստուգում եմ...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const uid = user.uid; // Սա հենց Xg6ls...2-ն է
            
            // ՈՒՂՂՎԱԾ ՃԱՆԱՊԱՐՀ: Ուղղակի users պանակի մեջ
            const docRef = doc(db, "users", uid);

            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('coins').innerText = data.coins;
                    document.getElementById('lvl').innerText = data.level;
                    document.getElementById('status').innerText = "✅ ԿԱՊԸ ՀԱՍՏԱՏՎԱԾ Է";
                    document.getElementById('status').style.color = "#32CD32";
                } else {
                    document.getElementById('status').innerHTML = 
                        "<span style='color:#ff4444'>❌ Տվյալը չկա:</span><br>Համոզվիր, որ Firestore-ում 'users' պանակի մեջ կա տող <br><b>" + uid + "</b> անունով";
                }
            });
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
