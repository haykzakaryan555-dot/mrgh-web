<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Dashboard</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body {
            background: #1e1e1e url('https://www.minecraft.net/content/dam/games/minecraft/key-art/Games_Subnav_Minecraft-Wild-Update_600x338.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Minecraft', sans-serif;
            color: white;
            margin: 0;
            text-shadow: 2px 2px #000;
        }
        .stats-bar {
            background: rgba(0,0,0,0.85);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #3c3c3c;
        }
        .logout-btn {
            background: #aa0000;
            border: 2px solid #000;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Minecraft', sans-serif;
        }
        .logout-btn:hover { background: #ff0000; }
        .xp-val { color: #32CD32; }
        .gold-val { color: #FFD700; }
        .main-card {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border: 4px solid #1e1e1e;
            text-align: center;
            margin: 100px auto;
            max-width: 400px;
        }
    </style>
</head>
<body>

<div class="stats-bar">
    <div>LEVEL: <span id="dispLevel" class="xp-val">...</span></div>
    <div>COINS: <span id="dispCoins" class="gold-val">...</span></div>
    <button class="logout-btn" id="logoutBtn">ԴՈՒՐՍ ԳԱԼ</button>
</div>

<div class="main-card">
    <h1>ՔՈ ՊՐՈՖԻԼԸ</h1>
    <p id="userMail" style="font-size: 12px; color: #bbb;"></p>
    <div id="debugStatus" style="font-size: 10px; color: #ff4444; margin-top: 10px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Logout
    document.getElementById('logoutBtn').onclick = () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const userEmail = user.email.toLowerCase().trim();
            document.getElementById('userMail').innerText = userEmail;

            // Ավտոմատ կապ Firestore-ի հետ
            const docRef = doc(db, "users", userEmail);
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('dispCoins').innerText = (data.coins !== undefined) ? data.coins : "0";
                    document.getElementById('dispLevel').innerText = (data.level !== undefined) ? data.level : "1";
                    document.getElementById('debugStatus').innerText = "ԿԱՊԸ ՀԱՍՏԱՏՎԱԾ Է";
                    document.getElementById('debugStatus').style.color = "#32CD32";
                } else {
                    document.getElementById('dispCoins').innerText = "0";
                    document.getElementById('debugStatus').innerText = "ՍԽԱԼ. Բազայում չկա պանակ '" + userEmail + "' անունով";
                    console.error("Firestore Error: No document found with ID:", userEmail);
                }
            }, (err) => {
                document.getElementById('debugStatus').innerText = "ERROR: Permission Denied (Ստուգիր Rules-ը)";
                console.error(err);
            });
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
