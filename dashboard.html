<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Dashboard Fixed</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body { background: #1e1e1e; font-family: 'Minecraft', sans-serif; color: white; text-align: center; }
        .stats { margin-top: 50px; font-size: 24px; }
        .gold { color: #FFD700; }
        #debugStatus { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="stats">
        LEVEL: <span id="dispLevel" style="color: #32CD32;">...</span> | 
        COINS: <span id="dispCoins" class="gold">...</span>
    </div>

    <div id="debugStatus">Կապակցում...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Հայկ, քո նկարում ճանապարհը սա է՝ users (coll) -> users (doc) -> users (sub-coll) -> UID (doc)
            const uid = user.uid; 
            const docRef = doc(db, "users", "users", "users", uid);

            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('dispCoins').innerText = data.coins;
                    document.getElementById('dispLevel').innerText = data.level;
                    document.getElementById('debugStatus').innerText = "ՎԵՐՋԱՊԵՍ ԿՊԱՎ! ✅";
                    document.getElementById('debugStatus').style.color = "#32CD32";
                } else {
                    document.getElementById('debugStatus').innerHTML = 
                        "Տվյալը չկա այս հասցեում: <br> users/users/users/" + uid;
                    document.getElementById('debugStatus').style.color = "#ff4444";
                }
            });
        }
    });
</script>
</body>
</html>
