<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRGH - Dashboard</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    
    <style>
        body {
            background: #313131 url('https://www.minecraft.net/content/dam/games/minecraft/key-art/Games_Subnav_Minecraft-Wild-Update_600x338.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Minecraft', sans-serif;
            color: white;
            margin: 0;
            text-shadow: 2px 2px #000;
        }

        .top-nav {
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 4px solid #3c3c3c;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .xp-text { color: #32CD32; }
        .gold-text { color: #FFD700; }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }

        .main-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #1e1e1e;
            padding: 30px;
            text-align: center;
            image-rendering: pixelated;
        }

        .mc-btn {
            background: #484948;
            border: 4px solid #000;
            border-top-color: #8b8b8b;
            border-left-color: #8b8b8b;
            color: #e0e0e0;
            padding: 15px 30px;
            font-family: 'Minecraft', sans-serif;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px #000;
        }

        .mc-btn:hover { background-color: #52a832; color: white; }
        .mc-btn:active { box-shadow: 0 0 #000; transform: translateY(5px); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="stat-group">
        <img id="rankIcon" src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/44/Diamond_JE3_BE3.png" width="30">
        <span class="xp-text">LEVEL: <span id="dispLevel">1</span></span>
    </div>
    <div class="stat-group">
        <span class="gold-text">COINS: <span id="dispCoins">0</span></span>
    </div>
</div>

<div class="container">
    <div class="main-panel">
        <h1>ԲԱՐԻ ԳԱԼՈՒՍՏ</h1>
        <p>Քո Minecraft պրոյեկտը պատրաստ է:</p>
        <button class="mc-btn">ԲԱՑԵԼ TASKS</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // ՈՒՇԱԴՐՈՒԹՅՈՒՆ. Հիմա կարդում ենք ըստ UID-ի (ոչ թե email-ի)
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('dispCoins').innerText = data.coins || 0;
                    document.getElementById('dispLevel').innerText = data.level || 1;
                    if(data.rank_img) document.getElementById('rankIcon').src = data.rank_img;
                }
            });
        } else {
            window.location.href = "login.html"; // Եթե լոգին չես, հետ է ուղարկում
        }
    });
</script>
</body>
</html>
