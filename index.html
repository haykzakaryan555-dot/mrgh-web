<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>MRGH - Login</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body { background: #313131 url('https://minecraft.net/content/dam/archive/663c02f1a6f80996b9979730f9a2e88a-Background.png') repeat; background-size: 64px; image-rendering: pixelated; font-family: 'Minecraft', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-card { background: #c6c6c6; border: 4px solid #000; box-shadow: inset -4px -4px #555, inset 4px 4px #fff; padding: 30px; width: 300px; text-align: center; }
        input { width: 90%; background: #000; border: 2px solid #555; color: #32CD32; padding: 10px; margin-bottom: 10px; font-family: 'Courier New', monospace; }
        .mc-btn { background: #484948; border: 3px solid #000; color: white; padding: 10px; width: 100%; cursor: pointer; font-family: 'Minecraft', sans-serif; }
        .mc-btn:hover { background: #52a832; }
    </style>
</head>
<body>
<div class="login-card">
    <h2 style="color: #3f3f3f;">LOGIN</h2>
    <input type="email" id="email" placeholder="Էլ. փոստ">
    <input type="password" id="pass" placeholder="Գաղտնաբառ">
    <button class="mc-btn" id="loginBtn">ՄՏՆԵԼ</button>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    const firebaseConfig = {
        apiKey: "AIzaSyDC8NLaKxVPNZlVyRyra_KfDK3KD0ZKcYo",
        authDomain: "mrgh-project.firebaseapp.com",
        projectId: "mrgh-project",
        storageBucket: "mrgh-project.firebasestorage.app",
        messagingSenderId: "128834044854",
        appId: "1:128834044854:web:ce5e8dac90395ffeddf717"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    document.getElementById('loginBtn').addEventListener('click', async () => {
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
            window.location.href = "dashboard.html";
        } catch (e) { alert("Սխալ տվյալներ!"); }
    });
</script>
</body>
</html>
